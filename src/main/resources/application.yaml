server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:h2:mem:trafficdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  sql:
    init:
      mode: always

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create